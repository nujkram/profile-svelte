name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check
        env:
          # svelte-check imports server modules that read DATABASE_URL at module load
          DATABASE_URL: mongodb://localhost:27017/Test

      - name: Lint
        run: npm run lint
